apiVersion: v1
kind: Pod
metadata:
  name: vote
spec:
  containers:
    - image: registry.gitlab.com/voting-application/vote:latest
apiVersion: v1
kind: Pod
metadata:
  name: db
spec:
  containers:
  - image: postgres:15.1-alpine3.17
    name: postgres
    env:
      - name: POSTGRES_PASSWORD
        value: postgres